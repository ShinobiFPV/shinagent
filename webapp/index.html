<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<!-- PWA -->
<link rel="manifest" href="/static/manifest.json">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Q2">
<link rel="apple-touch-icon" href="/static/icons/icon-180.png">

<!-- Theme -->
<meta name="theme-color" content="#0a0820">
<meta name="msapplication-TileColor" content="#0a0820">

<title>Q2</title>
<style>
  :root {
    --bg:      #0a0a12;
    --panel:   #111120;
    --accent:  #ff2fb0;
    --accent2: #00c8ff;
    --text:    #f0f0ff;
    --dim:     #666880;
    --radius:  12px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    overflow: hidden;
    position: fixed;
  }

  /* ── Layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  header {
    flex-shrink: 0;
    padding: 12px 16px 0;
    border-bottom: 1px solid rgba(255,47,176,0.2);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
  }
  .header-btns {
    display: flex;
    gap: 8px;
    padding-bottom: 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .header-btns::-webkit-scrollbar { display: none; }
  .hbtn {
    flex-shrink: 0;
    background: none;
    border-radius: 20px;
    font-size: 0.82rem;
    padding: 6px 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    letter-spacing: 0.04em;
    white-space: nowrap;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .hbtn-primary {
    border: 1px solid rgba(255,47,176,0.5);
    color: var(--accent);
  }
  .hbtn-secondary {
    border: 1px solid rgba(245,245,255,0.2);
    color: var(--dim);
  }
  .hbtn.active {
    border-color: rgba(255,47,176,0.8);
    color: var(--accent);
    background: rgba(255,47,176,0.1);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #444;
    transition: background 0.3s;
  }
  .status-dot.online  { background: #44dd88; }
  .status-dot.working { background: var(--accent2); animation: pulse-ring 1s ease-out infinite; }

  /* ── Message list ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }

  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 0.92rem;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: rgba(255,47,176,0.18);
    border: 1px solid rgba(255,47,176,0.3);
  }
  .msg.q2 {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid rgba(0,200,255,0.2);
    color: var(--text);
  }
  .msg.q2 .name {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--accent2);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .msg.system {
    align-self: center;
    background: none;
    font-size: 0.75rem;
    color: var(--dim);
    border: none;
    padding: 4px 0;
  }
  .msg img {
    max-width: 100%;
    border-radius: 8px;
    margin-top: 6px;
    display: block;
  }
  .thinking-dots span {
    animation: blink 1.2s infinite;
    font-size: 1.2rem;
    letter-spacing: 2px;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity:0.2 } 40% { opacity:1 } }

  /* ── Input bar ── */
  #input-bar {
    flex-shrink: 0;
    background: var(--panel);
    border-top: 1px solid rgba(255,47,176,0.2);
    padding: 10px 12px calc(10px + var(--safe-bottom));
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #text-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,47,176,0.25);
    border-radius: 20px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    padding: 10px 16px;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
    overflow-y: auto;
    -webkit-appearance: none;
    line-height: 1.4;
  }
  #text-input::placeholder { color: var(--dim); }

  .icon-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.2rem;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-user-select: none;
  }
  .icon-btn:active { transform: scale(0.9); opacity: 0.8; }

  #send-btn   { background: var(--accent); color: #000; }
  #camera-btn { background: rgba(255,47,176,0.15); color: var(--accent); border: 1px solid rgba(255,47,176,0.3); }
  #ptt-btn    { background: rgba(0,200,255,0.15); color: var(--accent2); border: 1px solid rgba(0,200,255,0.3); }

  #ptt-btn.recording {
    background: var(--accent2);
    color: #000;
    animation: pulse-ring 1s ease-out infinite;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(0,200,255,0.5); }
    70%  { box-shadow: 0 0 0 10px rgba(0,200,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,200,255,0); }
  }

  /* Face mode */
  #face-mode {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }
  #face-mode.active { display: flex; }
  #face-canvas-wrap {
    position: relative;
    width: 100%;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #face-canvas { display: block; touch-action: none; }
  #face-ptt-hint {
    position: absolute;
    bottom: 28px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    color: rgba(255,47,176,0.5);
    pointer-events: none;
    transition: opacity 0.4s;
  }
  #face-exit-btn {
    position: absolute;
    top: max(16px, env(safe-area-inset-top));
    right: 16px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,47,176,0.3);
    border-radius: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 0.75rem;
    padding: 6px 14px;
    cursor: pointer;
    font-family: inherit;
    z-index: 10;
  }

  /* Hidden camera input */
  #camera-input { display: none; }
</style>
</head>

<script>
// BASE auto-detects the current host and port so it works whether accessed
// via local IP, Tailscale IP, or Tailscale Serve HTTPS hostname.
const BASE = `${location.protocol}//${location.host}`;

const messagesEl  = document.getElementById('messages');
const textInput   = document.getElementById('text-input');
const pttBtn      = document.getElementById('ptt-btn');
const statusDot   = document.getElementById('status-dot');
const cameraInput = document.getElementById('camera-input');

// ── Autoplay toggle ──────────────────────────────────────────────────────────
const voiceToggleBtn = document.getElementById('voice-toggle');
// Default to ON — if the key hasn't been set yet (new device/browser) autoplay is on
let autoplayEnabled = localStorage.getItem('q2-autoplay') !== 'false';

function updateAutoplayToggle() {
  if (autoplayEnabled) {
    voiceToggleBtn.textContent = '🔊 Autoplay on';
    voiceToggleBtn.classList.add('active');
  } else {
    voiceToggleBtn.textContent = '🔇 Autoplay off';
    voiceToggleBtn.classList.remove('active');
  }
}
updateAutoplayToggle();

voiceToggleBtn.addEventListener('click', () => {
  autoplayEnabled = !autoplayEnabled;
  localStorage.setItem('q2-autoplay', autoplayEnabled);
  updateAutoplayToggle();
});

async function speakReply(text) {
  if (!text) return;

  let arrayBuffer;
  try {
    const res = await fetch(`${BASE}/tts`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text}),
    });
    if (!res.ok) { console.warn('TTS endpoint returned', res.status); return; }
    arrayBuffer = await res.arrayBuffer();
  } catch(e) {
    console.warn('TTS fetch error:', e);
    return;
  }

  if (autoplayEnabled && audioCtx) {
    try {
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioCtx.destination);
      // Drive face animation during playback
      const fakeEnvelope = Array.from({length:20}, (_,i) => 0.5+0.4*Math.sin(i*0.8));
      setFaceSpeaking(true, fakeEnvelope, audioBuffer.duration);
      source.onended = () => setFaceSpeaking(false);
      source.start(0);
      return;
    } catch(e) {
      console.warn('AudioContext playback failed, falling back:', e);
    }
  }

  // Autoplay off, or AudioContext not available — show tap-to-play button
  const blob = new Blob([arrayBuffer], {type: 'audio/wav'});
  const url  = URL.createObjectURL(blob);
  const audio = new Audio(url);
  audio.onended = () => { URL.revokeObjectURL(url); setFaceSpeaking(false); };
  audio.onplay  = () => {
    const fakeEnvelope = Array.from({length:20}, (_,i) => 0.5+0.4*Math.sin(i*0.8));
    setFaceSpeaking(true, fakeEnvelope, audio.duration || 3);
  };

  if (autoplayEnabled) {
    audio.play().catch(() => showPlayButton(audio));
  } else {
    showPlayButton(audio);
  }
}

function showPlayButton(audio) {
  const btn = document.createElement('div');
  btn.className = 'msg system';
  btn.style.cssText = 'cursor:pointer;user-select:none;display:flex;align-items:center;gap:8px;';
  btn.innerHTML = '<span style="font-size:1.1rem">▶</span><span>Tap to hear Q2</span>';
  btn.onclick = () => {
    audio.play();
    btn.innerHTML = '<span style="font-size:1.1rem">🔊</span><span>Playing…</span>';
    audio.onended = () => { URL.revokeObjectURL(audio.src); btn.remove(); };
  };
  messagesEl.appendChild(btn);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── Voice Selector Panel ─────────────────────────────────────────────────────
let voicePanelOpen = false;

async function initVoicePanel() {
  try {
    const r = await fetch(`${BASE}/voice`);
    const d = await r.json();
    if (d.current) {
      const sel = document.getElementById('voice-select');
      if (sel) sel.value = d.current;
    }
  } catch(e) {}
}

function toggleVoicePanel() {
  const panel = document.getElementById('voice-panel');
  const btn   = document.getElementById('voice-panel-btn');
  voicePanelOpen = !voicePanelOpen;
  panel.style.display = voicePanelOpen ? 'block' : 'none';
  btn.classList.toggle('active', voicePanelOpen);
}

async function applyVoice() {
  const model = document.getElementById('voice-select')?.value;
  if (!model) return;
  const note = document.getElementById('voice-note');
  try {
    const r = await fetch(`${BASE}/voice`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model}),
    });
    const d = await r.json();
    if (d.ok) {
      if (note) note.textContent = `✓ Voice set to ${model.replace('aura-2-','').replace('-en','')}`;
      setTimeout(() => { if (note) note.textContent = ''; }, 3000);
    } else {
      if (note) note.textContent = d.error || 'Failed';
    }
  } catch(e) {
    if (note) note.textContent = `Error: ${e.message}`;
  }
}

// ── LLM Switcher Panel ────────────────────────────────────────────────────────
const WEBAPP_LLM_MODELS = {
  claude: ['claude-sonnet-4-6','claude-opus-4-6','claude-haiku-4-5-20251001'],
  grok:   ['grok-3-mini','grok-3','grok-2'],
  openai: ['gpt-4o','gpt-4o-mini','gpt-4-turbo'],
  ollama: ['glm-5.2:cloud','llama3','mistral','phi3'],
  glm:    ['glm-5.2','glm-5.1','glm-4.7'],
};
const WEBAPP_LLM_LABELS = {
  claude:'Claude', grok:'Grok', openai:'GPT-4o', ollama:'Ollama'
};
const WEBAPP_LLM_NOTES = {
  claude:'Default — best quality, full tool support.',
  grok:  'Requires XAI_API_KEY in .env.',
  openai:'Requires OPENAI_API_KEY in .env.',
  ollama:'Local model — no API key needed.',
  glm:   'Requires ZAI_API_KEY in .env — get one at z.ai.',
};

let llmPanelOpen = false;

async function initLlmPanel() {
  try {
    const r = await fetch(`${BASE}/health`);
    const d = await r.json();
    if (d.llm_backend) {
      const sel = document.getElementById('webapp-llm-backend');
      if (sel) sel.value = d.llm_backend;
      updateWebappLlmControls();

async function switchLlmAndRestart() {
  const backend = document.getElementById('webapp-llm-backend')?.value || 'claude';
  const model   = document.getElementById('webapp-llm-model')?.value || '';
  const btn = document.getElementById('llm-restart-btn');
  if (btn) { btn.textContent = 'Restarting…'; btn.disabled = true; }
  try {
    // Save to config via health endpoint workaround — post to restart directly
    // which will pick up the config change we make via a settings POST first
    await fetch(`${BASE}/llm-switch`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({backend, model: model||undefined}),
    });
    addMsg('system', `Switching to ${WEBAPP_LLM_LABELS[backend]||backend}${model?' ('+model+')':''} — restarting Q2…`);
    await new Promise(r => setTimeout(r, 800));
    await fetch(`${BASE}/restart`, {method:'POST'});
    // Poll until back
    let tries = 0;
    const poll = setInterval(async () => {
      tries++;
      try {
        const r = await fetch(`${BASE}/health`,{cache:'no-store'});
        if (r.ok) {
          clearInterval(poll);
          const d = await r.json();
          const label = WEBAPP_LLM_LABELS[d.llm_backend||backend]||backend;
          document.getElementById('llm-label').textContent = label;
          addMsg('system', `Q2 restarted on ${label}.`);
          if (btn) { btn.textContent = 'Save & Restart'; btn.disabled = false; }
          toggleLlmPanel();
        }
      } catch(e){}
      if (tries > 30) { clearInterval(poll); if (btn) { btn.textContent = 'Save & Restart'; btn.disabled = false; } }
    }, 1000);
  } catch(e) {
    addMsg('system', `Switch failed: ${e.message}`);
    if (btn) { btn.textContent = 'Save & Restart'; btn.disabled = false; }
  }
}

// ── Face Mode ──────────────────────────────────────────────────────────────────
let faceModeActive = false;
let faceAnimFrame  = null;
let faceState      = { speaking:false, listening:false, thinking:false,
                       envelope:[], duration_s:0, started_at:0,
                       face_style:7,
                       bg_colour:'#0d1b4c', bar_colour_1:'#ff2fb0', bar_colour_2:'#f5f5ff' };
let faceT          = 0;
let facePollTimer  = null;

const faceCanvas  = document.getElementById('face-canvas');
const faceCtx     = faceCanvas ? faceCanvas.getContext('2d') : null;
const facePttHint = document.getElementById('face-ptt-hint');

function enterFaceMode() {
  faceModeActive = true;
  document.getElementById('face-mode').classList.add('active');
  unlockAudio();
  sizeFaceCanvas();
  initFaceRenderer();
  startFaceStatePoll();
  if (faceAnimFrame) cancelAnimationFrame(faceAnimFrame);
  faceAnimFrame = requestAnimationFrame(faceDrawLoop);
}

function exitFaceMode() {
  faceModeActive = false;
  document.getElementById('face-mode').classList.remove('active');
  if (faceAnimFrame) { cancelAnimationFrame(faceAnimFrame); faceAnimFrame = null; }
  if (facePollTimer) { clearInterval(facePollTimer); facePollTimer = null; }
  if (isRecording) stopRecording();
}

function sizeFaceCanvas() {
  if (!faceCanvas) return;
  const wrap = document.getElementById('face-canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const scale = Math.min(W/720, H/1280);
  faceCanvas.width  = 720;
  faceCanvas.height = 1280;
  faceCanvas.style.width  = Math.round(720*scale) + 'px';
  faceCanvas.style.height = Math.round(1280*scale) + 'px';
}
window.addEventListener('resize', () => { if (faceModeActive) sizeFaceCanvas(); });

async function startFaceStatePoll() {
  // Try to get colours from face server if running, but don't depend on it for state.
  // State is driven locally by setFaceListening/setFaceThinking/setFaceSpeaking.
  if (facePollTimer) clearInterval(facePollTimer);
  facePollTimer = setInterval(async () => {
    try {
      const d = await (await fetch('/face-api/state',{cache:'no-store'})).json();
      if (d.bg_colour)    faceState.bg_colour    = d.bg_colour;
      if (d.bar_colour_1) faceState.bar_colour_1 = d.bar_colour_1;
      if (d.bar_colour_2) faceState.bar_colour_2 = d.bar_colour_2;
      if (d.face_style !== undefined) faceState.face_style = d.face_style;
    } catch(e) {}
  }, 2000);
}

function setFaceListening(v) {
  faceState.listening = v;
  faceState.thinking  = false;
  if (!v) faceState.speaking = false;
}
function setFaceThinking(v) {
  faceState.thinking  = v;
  faceState.listening = false;
  faceState.speaking  = false;
}
function setFaceSpeaking(v, envelope, duration_s) {
  faceState.speaking   = v;
  if (v) {
    // Only clear thinking when speaking actually starts
    faceState.thinking  = false;
    faceState.listening = false;
  }
  if (v && envelope) {
    faceState.envelope   = envelope;
    faceState.duration_s = duration_s || 0;
    faceState.started_at = Date.now() / 1000;
  } else if (!v) {
    faceState.thinking  = false;
    faceState.listening = false;
  }
}

// Shared colour helpers for face canvas
function fhexRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];
}
function frgb(hex,a) {
  const [r,g,b]=fhexRgb(hex);
  return a!==undefined?`rgba(${r},${g},${b},${a})`:`rgb(${r},${g},${b})`;
}
function fAmp() {
  if (!faceState.speaking||!faceState.envelope?.length) return null;
  const el=Date.now()/1000-faceState.started_at;
  if (el<0||el>faceState.duration_s) return null;
  const idx=Math.floor((el/faceState.duration_s)*(faceState.envelope.length-1));
  return faceState.envelope[Math.max(0,Math.min(idx,faceState.envelope.length-1))];
}

// Triangle mosaic renderer (disabled — face now uses iframe to face server)
const FW=720, FH=1280, FCOLS=20;
const FcellW=FW/(FCOLS/2), FcellH=FcellW*Math.sqrt(3)/2;
const FROWS=Math.ceil(FH/FcellH)+2, FmaxD=Math.sqrt(FW*FW+FH*FH);
let faceTris=[];

function initFaceRenderer() {
  faceTris=[];
  for (let row=0;row<FROWS;row++) {
    for (let col=0;col<FCOLS;col++) {
      const hw=FcellW/2,x0=col*hw,y0=row*FcellH,isUp=(col+row)%2===0;
      const verts=isUp?[[x0,y0+FcellH],[x0+FcellW,y0+FcellH],[x0+hw,y0]]:[[x0,y0],[x0+FcellW,y0],[x0+hw,y0+FcellH]];
      const cx=(verts[0][0]+verts[1][0]+verts[2][0])/3,cy=(verts[0][1]+verts[1][1]+verts[2][1])/3;
      const dx=cx-FW/2,dy=cy-FH/2,dist=Math.sqrt(dx*dx+dy*dy)/(FmaxD/2);
      const seed=Math.sin(col*127.1+row*311.7)*43758.5453,phase=(seed-Math.floor(seed))*Math.PI*2;
      faceTris.push({verts,cx,cy,dist,phase,bright:0});
    }
  }
}

// HAL eye state for webapp
let wHalAngle=0, wHalGlow=0, wHalPulse=0;
function drawWebappHAL(terminal) {
  const BG=faceState.bg_colour||'#0d1b4c';
  const C1=faceState.bar_colour_1||'#ff2fb0';
  const C2=faceState.bar_colour_2||'#f5f5ff';
  const listening=!!faceState.listening, thinking=!!faceState.thinking;
  const amp=fAmp(), speaking=amp!==null;
  wHalAngle+=0.008;
  let coreSize=0.13, glowTarget=0.5, ringSpeed=1, eyeColour=C1;
  if (listening)     { glowTarget=0.9; ringSpeed=2.5; coreSize=0.17; }
  else if (thinking) { glowTarget=0.6; ringSpeed=0.5; eyeColour=C2; }
  else if (speaking) { glowTarget=0.4+(amp||0)*0.5; ringSpeed=1.5+(amp||0)*2; }
  wHalGlow  += (glowTarget - wHalGlow) * 0.08;
  wHalPulse  = speaking ? (amp||0) : (0.5+0.5*Math.sin(Date.now()/1400));
  const cx=FW/2, cy=FH/2, R=Math.min(FW,FH)*0.38;
  faceCtx.fillStyle = terminal ? '#00080a' : BG;
  faceCtx.fillRect(0,0,FW,FH);
  if (terminal) {
    for (let sy=0;sy<FH;sy+=3) { faceCtx.fillStyle='rgba(0,200,100,0.04)'; faceCtx.fillRect(0,sy,FW,1); }
    faceCtx.font='11px Courier New,monospace'; faceCtx.fillStyle='rgba(0,200,255,0.3)';
    faceCtx.textBaseline='top'; faceCtx.fillText('H9000 TERMINAL // Q2', 16, 16);
    const ts=new Date().toTimeString().slice(0,8);
    const mode=thinking?'THINKING':listening?'LISTENING':speaking?'SPEAKING':'READY';
    faceCtx.textBaseline='bottom'; faceCtx.fillStyle='rgba(0,200,255,0.4)';
    faceCtx.fillText('Q2 // '+mode+' // '+ts, 16, FH-12);
  }
  function rgbS(hex,a){const h=hex.replace('#','');const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return 'rgba('+r+','+g+','+b+','+a+')';}
  const grad=faceCtx.createRadialGradient(cx,cy,R*0.85,cx,cy,R);
  grad.addColorStop(0,'rgba(40,40,50,1)'); grad.addColorStop(1,'rgba(10,10,15,1)');
  faceCtx.beginPath(); faceCtx.arc(cx,cy,R,0,Math.PI*2); faceCtx.fillStyle=grad; faceCtx.fill();
  for (let r=0;r<7;r++) {
    const rad=R*(0.75-r*0.07),dir=r%2===0?1:-1,alpha=0.15+r*0.04;
    faceCtx.beginPath(); faceCtx.arc(cx,cy,rad,0,Math.PI*2);
    faceCtx.strokeStyle=rgbS(eyeColour,alpha); faceCtx.lineWidth=1.5+r*0.3; faceCtx.stroke();
    const numT=12+r*4;
    for (let t=0;t<numT;t++) {
      const ang=(t/numT)*Math.PI*2+wHalAngle*ringSpeed*dir*(r+1)*0.15;
      const x1=cx+Math.cos(ang)*rad,y1=cy+Math.sin(ang)*rad;
      const x2=cx+Math.cos(ang)*(rad-6),y2=cy+Math.sin(ang)*(rad-6);
      faceCtx.beginPath(); faceCtx.moveTo(x1,y1); faceCtx.lineTo(x2,y2);
      faceCtx.strokeStyle=rgbS(eyeColour,0.25+wHalPulse*0.15);
      faceCtx.lineWidth=1; faceCtx.stroke();
    }
  }
  const irisR=R*0.38;
  const iG=faceCtx.createRadialGradient(cx,cy,irisR*0.6,cx,cy,irisR);
  iG.addColorStop(0,rgbS(eyeColour,0.15)); iG.addColorStop(1,rgbS(eyeColour,0.55));
  faceCtx.beginPath(); faceCtx.arc(cx,cy,irisR,0,Math.PI*2); faceCtx.fillStyle=iG; faceCtx.fill();
  const coreR=Math.min(FW,FH)*(coreSize+wHalPulse*0.02);
  const cG=faceCtx.createRadialGradient(cx,cy,0,cx,cy,coreR);
  cG.addColorStop(0,'rgba(255,255,230,1)'); cG.addColorStop(0.2,rgbS(eyeColour,1));
  cG.addColorStop(0.7,rgbS(eyeColour,wHalGlow)); cG.addColorStop(1,rgbS(eyeColour,0));
  faceCtx.beginPath(); faceCtx.arc(cx,cy,coreR*2.5,0,Math.PI*2); faceCtx.fillStyle=cG; faceCtx.fill();
  faceCtx.beginPath(); faceCtx.arc(cx-coreR*0.25,cy-coreR*0.25,coreR*0.18,0,Math.PI*2);
  faceCtx.fillStyle='rgba(255,255,255,0.85)'; faceCtx.fill();
  const hG=faceCtx.createRadialGradient(cx,cy,R*0.9,cx,cy,R*1.4);
  hG.addColorStop(0,rgbS(eyeColour,wHalGlow*0.4)); hG.addColorStop(1,rgbS(eyeColour,0));
  faceCtx.beginPath(); faceCtx.arc(cx,cy,R*1.4,0,Math.PI*2); faceCtx.fillStyle=hG; faceCtx.fill();
  if (thinking) {
    const sweep=(Date.now()/2000)%(Math.PI*2);
    faceCtx.save(); faceCtx.translate(cx,cy); faceCtx.rotate(sweep);
    faceCtx.strokeStyle=rgbS(C2,0.4); faceCtx.lineWidth=1;
    faceCtx.beginPath(); faceCtx.moveTo(-R*0.9,0); faceCtx.lineTo(R*0.9,0); faceCtx.stroke();
    faceCtx.beginPath(); faceCtx.moveTo(0,-R*0.9); faceCtx.lineTo(0,R*0.9); faceCtx.stroke();
    faceCtx.restore();
  }
}

function faceDrawLoop() {
  if (!faceModeActive||!faceCtx) return;
  faceT+=0.022;
  const style = faceState.face_style || 0;
  if (style===1||style===7) {
    drawWebappHAL(style===7);
    faceCtx.shadowBlur=0;
    if(facePttHint)facePttHint.style.opacity=isRecording?'0':'1';
    faceAnimFrame=requestAnimationFrame(faceDrawLoop); return;
  }
  const BG=faceState.bg_colour||'#0d1b4c',C1=faceState.bar_colour_1||'#ff2fb0',C2=faceState.bar_colour_2||'#f5f5ff';
  const listening=!!faceState.listening,thinking=!!faceState.thinking;
  const amp=fAmp(),speaking=amp!==null;

  faceCtx.fillStyle=listening?C1:thinking?C2:BG;
  faceCtx.fillRect(0,0,FW,FH);

  for (let i=0;i<faceTris.length;i++) {
    const {cx,cy,dist,phase,verts}=faceTris[i];
    let target;
    if (listening)     target=0.15+0.3*Math.abs(Math.sin((1-dist)*Math.PI*3-faceT*2.2+phase*0.15));
    else if (thinking) target=0.05+0.45*Math.pow(Math.max(0,Math.sin(faceT*2.8+phase)),4);
    else if (speaking) target=Math.max(0.05,Math.min(1,amp*(0.4+0.6*Math.sin(dist*Math.PI*6-faceT*3.5+phase*0.1))*(1-dist*0.25)));
    else               target=0.05+0.25*Math.abs(Math.sin((cx/FW+cy/FH)*Math.PI*1.8-faceT*0.9+phase));
    faceTris[i].bright+=(target-faceTris[i].bright)*0.15;
    const b=Math.max(0,Math.min(1,faceTris[i].bright));
    if (b<0.02) continue;
    let fill;
    if (listening||thinking){const rgb=fhexRgb(listening?BG:C1);fill=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${(b*0.9).toFixed(3)})`;}
    else if (speaking){const base=[BG,C1,C2][(i+Math.floor(faceT*2))%3];fill=frgb(base,b);}
    else fill=frgb(i%2===0?C1:C2,b*0.85);
    if (speaking&&b>0.5){faceCtx.shadowColor=fill;faceCtx.shadowBlur=b*14;}
    else faceCtx.shadowBlur=0;
    faceCtx.fillStyle=fill;
    faceCtx.beginPath();
    faceCtx.moveTo(verts[0][0],verts[0][1]);
    faceCtx.lineTo(verts[1][0],verts[1][1]);
    faceCtx.lineTo(verts[2][0],verts[2][1]);
    faceCtx.closePath(); faceCtx.fill();
  }
  faceCtx.shadowBlur=0;

  // PTT hint fades when recording
  if (facePttHint) facePttHint.style.opacity = isRecording ? '0' : '1';

  faceAnimFrame = requestAnimationFrame(faceDrawLoop);
}

// ── Audio context unlock (Safari autoplay fix) ─────────────────────────────────
// Safari blocks audio.play() unless it's called within a user gesture.
// We create an AudioContext on the first tap anywhere, which unlocks
// subsequent programmatic audio.play() calls for the rest of the session.
let audioCtx = null;

function unlockAudio() {
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // Always attempt resume — iOS can suspend the context after inactivity
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  } catch(e) {}
}

// Unlock on any tap — covers button taps, keyboard, anywhere
document.addEventListener('click',     unlockAudio, {once: false, passive: true});
document.addEventListener('touchstart', unlockAudio, {once: false, passive: true});
document.addEventListener('keydown',   unlockAudio, {once: false, passive: true});

    } catch(e) {
      cameraLiveOpen = false;
      if (e.name === 'NotAllowedError') {
        addMsg('system', '📷 Camera permission denied. Go to Settings → Q2 → Camera and allow access.');

// ── Message rendering ────────────────────────────────────────────────────────
// Detect URLs in text and render them as tappable links
function linkify(text) {
  const urlRe = /(https?:\/\/[^\s<>"]+)/g;
  const parts = text.split(urlRe);
  const frag = document.createDocumentFragment();
  parts.forEach((part, i) => {
    if (i % 2 === 1) {
      const a = document.createElement('a');
      a.href = part;
      a.textContent = part;
      a.target = '_blank';
      a.rel = 'noopener';
      a.style.cssText = 'color:var(--accent2);word-break:break-all;';
      frag.appendChild(a);
    } else if (part) {
      frag.appendChild(document.createTextNode(part));
    }
  });
  return frag;
}

function addMsg(role, content, imgSrc) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'q2') {
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = 'Q2';
    div.appendChild(name);
  }
  if (content) {
    const p = document.createElement('div');
    if (role === 'q2') {
      p.appendChild(linkify(content));
    } else {
      p.textContent = content;
    }
    div.appendChild(p);
  }
  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    div.appendChild(img);
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'msg q2';
  div.innerHTML = '<div class="name">Q2</div><div class="thinking-dots"><span>•</span><span>•</span><span>•</span></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

    });

    const reply = data.reply || data.error || '(no reply)';
    addMsg('q2', reply);
    setFaceThinking(false);
    speakReply(reply);
  } catch(e) {
    thinking.remove();
    setFaceThinking(false);
    addMsg('system', `Error: ${e.message}`);
  }
  setStatus('online');
  isSending = false;
}

    formData.append('message', prompt);
    const res  = await fetch(`${BASE}/analyze`, {method: 'POST', body: formData});
    const data = await res.json();
    thinking.remove();
    const reply = data.reply || data.error || '(no reply)';
    addMsg('q2', reply);
    speakReply(reply);
  } catch(e) {
    thinking.remove();
    addMsg('system', `Error: ${e.message}`);
  }
  setStatus('online');
});

// ── Voice PTT ────────────────────────────────────────────────────────────────
// We request a fresh getUserMedia stream for every recording session rather
// than reusing one. Reusing a stream causes it to go stale after a few uses
// in Safari/Chrome, leading to silent recordings or "device in use" errors.
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;

async function startRecording() {
  if (isRecording) return;
  unlockAudio();  // ensure AudioContext is live before recording

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    addMsg('system',
      location.protocol === 'https:'
        ? 'Microphone not available in this browser.'
        : '⚠ Voice requires HTTPS. Connect via Tailscale for microphone access.'
    );
    return;
  }

  let stream;
  try {
    // Fresh stream every time — avoids stale track errors after several recordings
    stream = await navigator.mediaDevices.getUserMedia({audio: true, video: false});
  } catch(e) {
    const msg = e.name === 'NotAllowedError'
      ? 'Microphone permission denied. Allow mic access in Settings → Safari.'
      : `Microphone error: ${e.message || e.name}`;
    addMsg('system', msg);
    return;
  }

  const mimeOptions = [
    'audio/webm;codecs=opus', 'audio/webm',
    'audio/ogg;codecs=opus',  'audio/ogg',
    'audio/mp4', '',
  ];
  const mimeType = mimeOptions.find(m => !m || MediaRecorder.isTypeSupported(m)) || '';

  try {
    mediaRecorder = new MediaRecorder(stream, mimeType ? {mimeType} : {});
  } catch(e) {
    stream.getTracks().forEach(t => t.stop());
    addMsg('system', `Recording error: ${e.message}`);
    return;
  }

  audioChunks = [];
  const capturedStream = stream;  // close over this specific stream instance
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    // Stop only the tracks from THIS recording session — not any newer stream
    // that may have already been acquired by the next startRecording() call.
    capturedStream.getTracks().forEach(t => t.stop());
    const blob = new Blob(audioChunks, {type: mediaRecorder.mimeType || 'audio/webm'});
    await sendAudio(blob);
  };
  mediaRecorder.onerror = e => {
    capturedStream.getTracks().forEach(t => t.stop());
    isRecording = false;
    pttBtn.classList.remove('recording');
    pttBtn.textContent = '🎙';
    addMsg('system', `Recording error: ${e.error?.message || 'unknown'}`);
  };

  mediaRecorder.start();
  isRecording = true;
  pttBtn.classList.add('recording');
  pttBtn.textContent = '⏹';
  addMsg('system', 'Recording…');
  setFaceListening(true);
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  mediaRecorder.stop();
  isRecording = false;
  pttBtn.classList.remove('recording');
  pttBtn.textContent = '🎙';
  setFaceListening(false);
}

async function sendAudio(blob) {
  const thinking = addThinking();
  setStatus('working');
  setFaceThinking(true);
  try {
    const formData = new FormData();
    formData.append('audio', blob, 'recording.webm');
    const tRes       = await fetch(`${BASE}/transcribe`, {method: 'POST', body: formData});
    const tData      = await tRes.json();
    const transcript = tData.transcript || '';

    if (!transcript.trim()) {
      thinking.remove();
      setFaceThinking(false);
      addMsg('system', '(Nothing transcribed — try again)');
      setStatus('online');
      return;
    }

    addMsg('user', transcript);

    const cRes  = await fetch(`${BASE}/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: transcript}),
    });
    const cData = await cRes.json();
    thinking.remove();
    const reply = cData.reply || cData.error || '(no reply)';
    addMsg('q2', reply);
    setFaceThinking(false);
    speakReply(reply);
  } catch(e) {
    thinking.remove();
    setFaceThinking(false);
    addMsg('system', `Error: ${e.message}`);
  }
  setStatus('online');
}

// Toggle PTT on tap
pttBtn.addEventListener('click', () => {
  if (isRecording) stopRecording();
  else startRecording();
});

// Hold-to-talk on desktop only — pointer events, not mouse, to avoid
// double-firing with the click handler on touch devices.
pttBtn.addEventListener('pointerdown', e => {
  if (e.pointerType === 'mouse' && e.button === 0) startRecording();
});
pttBtn.addEventListener('pointerup', e => {
  if (e.pointerType === 'mouse') stopRecording();
});

// ── Service Worker registration ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/static/sw.js')
      .then(reg => console.log('Q2 SW registered:', reg.scope))
      .catch(err => console.warn('Q2 SW registration failed:', err));
  });
}
</script>
